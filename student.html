<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body>
    <form>
        <h3>Personal Information</h3>
        <label for="name">Full Name</label>
        <input placeholder="Your name" type="text" id="name"><br><br>
        <label for="email">Email</label>
        <input placeholder="Your email" type="email" id="email"><br><br>
        <label for="password">Password</label>
        <input placeholder="Password" type="password" id="password"><br><br>
        <label for="age">Age</label>
        <input placeholder="Your age" type="number" id="age"><br><br>
        <hr>
        <label>Gender</label>
        <select>
            <option>Male</option>
            <option>Female</option>
            <option>Others</option>
        </select>
        <hr>
        <label for="skills">Skills</label><br>
        <input type="checkbox" id="html">
        <label for="html">HTML</label>
        <input type="checkbox" id="css">
        <label for="css">CSS</label>
        <input type="checkbox" id="javascript">
        <label for="javascript">JAVASCRIPT</label>
        <hr>
        <label for="Departments">Departments</label>
        <select id="Departments">
            <option>CSE</option>
            <option>EEE</option>
            <option>BBA</option>
            <option>ENGLISH</option>
        </select>
        <hr>
        <label for="about">About Yourself</label>
        <textarea id="about" rows="10" cols="15" placeholder="Tell us about yourself"></textarea>
        <hr>
        <br>
        <label for="photo"><strong>Profile Photo</strong></label>
        <br>
        <input type="file" id="photo" accept="image/*">
        <br>
        <strong>Terms</strong><br>
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the terms and conditions</label>
        <br><br>
        <strong>Button</strong><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        <br><br>
        <a href="file:///C:/PROJECTS/first/second.html" target="_blank">Visit Our Website</a>
    </form>
</body>

</html>
